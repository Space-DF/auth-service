<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - SPACE·DF</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background-color: #fff;
      color: #1c1c1c;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 20px;
      text-align: center;
    }

    a {
      text-decoration: none;
    }

    .logo {
      margin-bottom: 20px;
    }

    .illustration img {
      width: 100%;
      max-width: 300px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    p {
      font-size: 16px;
    }

    .btn {
      background-color: #1c1c28;
      color: white !important;
      padding: 12px 24px;
      border-radius: 8px;
      display: inline-block;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .footer {
      background-color: #1c1c28;
      color: #fff;
      padding: 20px 20px;
      border-radius: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .footer-logo {
      font-weight: bold;
      font-size: 18px;
    }

    .social-icons {
      display: flex;
    }

    .social-icons a {
      margin: 0 0 0 15px;
      color: #fff;
      font-size: 20px;
    }

    .footer-top {
      display: flex;
    }

    .footer-bottom {
      display: flex;
      font-size: 16px;
      color: #FFFFFF;
      margin-top: 5px;
    }

    .round {
      display: inline-block; 
      background: #2D2F30; 
      border-radius: 50%; 
      width: 40px; 
      height: 40px; 
      text-align: center;
      margin-left: 10px;
    }

    .footer-bottom a {
      color: #FFFFFF;
      font-size: 15px;
    }
    
    table td a{
      color: white !important;
    }

    .footer-bottom p {
      color: #FFFFFF;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="{{ host }}/static/images/logo_black.png" width="190" height="43"/>
    </div>
    <div class="illustration">
      <img src="{{ host }}/static/images/forget_password.png"/>
    </div>
    <h1>Reset Password</h1>
    <p>Need to reset password? No problem.<br>Just click the button below</p>
    <a href="{{ sub_host }}/?token={{ token }}&type=forget-password" class="btn">Reset password</a>
    <p>If you did not initiate this request, please contact us at <a
        href="mailto:support@spacedf.com">support@spacedf.com</a></p>
  </div>
  <div class="footer">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td align="left" style="padding: 10px 0;">
          <img src="{{ host }}/static/images/logo_white.png" width="180" height="50" alt="Logo" />
        </td>
        <td align="right" style="padding: 10px 0;">
          <table cellpadding="0" cellspacing="0" role="presentation">
            <tr>
              <td>
                <a href="#" class="round">
                  <img src="{{ host }}/static/images/in.png" width="24" height="24" alt="LinkedIn" style="margin-top: 8px;" />
                </a>
              </td>
              <td>
                <a href="#" class="round">
                  <img src="{{ host }}/static/images/face_book.png" width="24" height="24" alt="Facebook" style="margin-top: 8px;" />
                </a>
              </td>
              <td>
                <a href="#" class="round">
                  <img src="{{ host }}/static/images/instagram.png" width="24" height="24" alt="Instagram" style="margin-top: 8px;" />
                </a>
              </td>
              <td>
                <a href="#" class="round">
                  <img src="{{ host }}/static/images/tik_tok.png" width="24" height="24" alt="TikTok" style="margin-top: 8px;" />
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td>
          <p>©2025 Digital Fortress. All rights reserved.</p>
        </td>
        <td>
          <p style="display: block; float: right; "><a href="#">Privacy Policy</a></p>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
