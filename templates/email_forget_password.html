<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - SPACE·DF</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background-color: #fff;
      color: #1c1c1c;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 20px;
      text-align: center;
    }

    a {
      text-decoration: none;
    }

    .logo {
      margin-bottom: 20px;
    }

    .illustration img {
      width: 100%;
      max-width: 300px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    p {
      font-size: 16px;
      color: #667085;
    }

    .btn {
      background-color: #1c1c28;
      color: white !important;
      padding: 12px 24px;
      border-radius: 8px;
      display: inline-block;
      margin-bottom: 30px;
    }

    .footer {
      background-color: #1c1c28;
      color: #fff;
      padding: 20px 20px;
      border-radius: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .footer-logo {
      font-weight: bold;
      font-size: 18px;
    }

    .social-icons {
      display: flex;
      margin-top: 20px;
    }

    .social-icons a {
      margin: 0 0 0 15px;
      color: #fff;
      font-size: 20px;
    }

    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      color: #FFFFFF;
      margin-top: 5px;
    }

    .round {
      height: 40px;
      width: 40px;
      display: flex;
      background: #2D2F30;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
    }

    .footer-bottom a {
      color: #FFFFFF;
      font-size: 15px;
    }
    .footer-bottom p {
      color: #FFFFFF;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://api.v0.spacedf.net/static/images/logo_black.png" width="190" height="43"/>
    </div>
    <div class="illustration">
      <img src="https://api.v0.spacedf.net/static/images/forget_password.png"/>
    </div>
    <h1>Reset Password</h1>
    <p>Need to reset password? No problem.<br>Just click the button below</p>
    <a href="https://{{ slug_name }}spacedf.net?token={{ token }}&type=forget-password" class="btn">Reset password</a>
    <p>If you did not initiate this request, please contact us at <a
        href="mailto:support@spacedf.com">support@spacedf.com</a></p>
  </div>
  <div class="footer">
    <div class="footer-top">
        <div class="footer-logo">
            <img src="https://api.v0.spacedf.net/static/images/logo_white.png" width="180" height="50"/>
        </div>
        <div class="social-icons">
            <a class="round" href="#">
              <img src="https://api.v0.spacedf.net/static/images/in.png" width="24" height="24"/>
            </a>
            <a class="round" href="#">
              <img src="https://api.v0.spacedf.net/static/images/face_book.png" width="24" height="24"/>
            </a>
            <a class="round" href="#">
              <img src="https://api.v0.spacedf.net/static/images/instagram.png" width="24" height="24"/>
            </a>
            <a class="round" href="#">
              <img src="https://api.v0.spacedf.net/static/images/tik_tok.png" width="24" height="24"/>
            </a>
        </div>
    </div>
    <div class="footer-bottom">
      <p>©2025 Digital Fortress. All rights reserved.</p>
      <a href="#">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
